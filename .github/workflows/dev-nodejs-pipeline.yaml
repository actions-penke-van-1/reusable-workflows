name: dev-nodejs-feature-pipeline
on: 
  workflow_call:
    inputs:
      project:
        required: true
        type: string
      component:
        required: true
        type: string
      environment:
        required: true
        type: string
env:
  ACC_ID: 131676642204 
jobs:
  nodejs-pipeline-dev:
    runs-on: self-hosted
    steps:
    - name: checkout code 
      uses: actions/checkout@v6
    - name: list files
      run: ls -la
    - name: get the version- commitID in 9 letters
      run: |
        # echo "APP_VERSION=${echo ${GITHUB_SHA} | cut -c1-9 }" >> $GITHUB_ENV
        #if you store it in GITHUB_ENV you can refer in other steps in the same job

        echo "APP_VERSION=${GITHUB_SHA::9}" >> $GITHUB_ENV

    - name: print inputs
      run: echo ${{inputs.project}}- ${{inputs.component}}- ${{inputs.environment}} - ${APP_VERSION}   


    - name: install deps
      run: npm install

    - name: run unit tests
      id: unit_tests
      run: echo "unit tests"

      #commit -update-status - reusable action calling
    - name: Update unit tests status
      if: always()
      uses: actions-penke-van-1/reusable-workflows/.github/actions/update-commit-status@main
      with:
        sha: ${{ github.sha }}
        state: ${{ steps.unit_tests.outcome }}     # success / failure / cancelled
        context: UNIT_TESTS
        description: ${{ steps.unit_tests.outcome }}


    - name: DOcker build
      id: docker_build
      run: |
        docker build -t ${ACC_ID}.dkr.ecr.us-east-1.amazonaws.com/${{inputs.project}}/${{inputs.component}}:${APP_VERSION} .
        docker images
# DOcker commit status

    - name: Update docker build status
      if: always()
      uses: actions-penke-van-1/reusable-workflows/.github/actions/update-commit-status@main
      with:
        sha: ${{ github.sha }}
        state: ${{ steps.docker_build.outcome }}     # success / failure / cancelled
        context: DOCKER_BUILD
        description: ${{ steps.docker_build.outcome }}



#scans(Trivy)
    - name: Security Check ( Trivy)
      id: security_check
      # env:
      #   GH_TOKEN: ${{ secrets.GH_TOKEN }}
      shell: bash
      run: |

        echo "🔍 Running Trivy scan..."
        trivy image \
          --scanners vuln \
          --severity HIGH,CRITICAL,MEDIUM \
          --pkg-types os \
          --exit-code 1 \
          --format table \
          ${ACC_ID}.dkr.ecr.us-east-1.amazonaws.com/${{ inputs.project }}/${{ inputs.component }}:${APP_VERSION}

        TRIVY_RESULT=$?

        if [ "$TRIVY_RESULT" -ne 0 ]; then
          echo "❌ Trivy found vulnerabilities (HIGH/CRITICAL/MEDIUM)"
          exit 1
        fi

        echo "✅ Trivy scan passed without blocking issues."

    - name: Update scan status
      if: always()
      uses: actions-penke-van-1/reusable-workflows/.github/actions/update-commit-status@main
      with:
        sha: ${{ github.sha }}
        state: ${{ steps.security_check.outcome }}     # success / failure / cancelled
        context: SECURITY_CHECK
        description: ${{ steps.security_check.outcome }}


    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v6.0.0
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1     
    - name: push image
      run: |
        aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${ACC_ID}.dkr.ecr.us-east-1.amazonaws.com
        docker push ${ACC_ID}.dkr.ecr.us-east-1.amazonaws.com/${{ inputs.project }}/${{ inputs.component }}:${APP_VERSION}           

    - name: Deploy to DEV 
      run: echo "Deploy code"

    - name: authenticate to EKS
      run: |
        aws eks update-kubeconfig --region us-east-1 --name roboshop-dev
        kubectl get nodes   

    - name: authenticate to EKS
      run: |
        aws eks update-kubeconfig --region us-east-1 --name roboshop-dev
        kubectl get nodes   

    - name: checkout catalogue deploy repo
      uses: actions/checkout@v6
      with:
        repository: Penke-Saivan/catalogue-deploy        