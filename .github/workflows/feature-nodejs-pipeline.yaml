name: node-js-feature-pipeline
on: 
  workflow_call:
    inputs:
      project:
        required: true
        type: string
      component:
        required: true
        type: string
      environment:
        required: true
        type: string
jobs:
  nodejs-pipeline:
    runs-on: self-hosted
    steps:
    - name: checkout code 
      uses: actions/checkout@v6
    - name: list files
      run: ls -latest
    - name: print inputs
      run: echo ${{inputs.project}}- ${{inputs.component}}- ${{inputs.environment}}     
