name: node-js-feature-pipeline
on: 
  workflow_call:
    inputs:
      project:
        required: true
        type: string
      component:
        required: true
        type: string
      environment:
        required: true
        type: string
env:
  ACC_ID: 131676642204 
jobs:
  nodejs-pipeline:
    runs-on: self-hosted
    steps:
    - name: checkout code 
      uses: actions/checkout@v6
    - name: list files
      run: ls -la
    - name: get the version- commitID in 9 letters
      run: |
        # echo "APP_VERSION=${echo ${GITHUB_SHA} | cut -c1-9 }" >> $GITHUB_ENV
        #if you store it in GITHUB_ENV you can refer in other steps in the same job

        echo "APP_VERSION=${GITHUB_SHA::9}" >> $GITHUB_ENV

    - name: print inputs
      run: echo ${{inputs.project}}- ${{inputs.component}}- ${{inputs.environment}} - ${APP_VERSION}   


    - name: install deps
      run: npm install
    - name: run unit tests
      run: echo "unit tests"
    - name: DOcker build
      run: |
        docker build -t ${ACC_ID}.dkr.ecr.us-east-1.amazonaws.com/${{inputs.project}}/${{inputs.component}}:${APP_VERSION} .
        docker images
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v6.0.0
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1     
    - name: push image
      run: |
        aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${ACC_ID}.dkr.ecr.us-east-1.amazonaws.com
        docker push ${ACC_ID}.dkr.ecr.us-east-1.amazonaws.com/${{ inputs.project }}/${{ inputs.component }}:${APP_VERSION}           